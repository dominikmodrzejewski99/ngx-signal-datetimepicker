name: Feature request
description: Suggest a feature, enhancement, or new use case
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user-visible pain. Skip "I want X" — start with "Today, when I…".
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: api
    attributes:
      label: Suggested API
      description: Sketch the input / output / template that should land. Code blocks welcome.
